name: CodeQL

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: 25
          architecture: x64
          distribution: 'zulu'
          cache: 'maven'
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Build project
        run: ./mvnw --batch-mode -Pskip-slow-tests verify
      - uses: github/codeql-action/analyze@v3
